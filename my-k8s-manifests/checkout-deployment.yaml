apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkoutservice
  labels:
    app: checkoutservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkoutservice
  template:
    metadata:
      labels:
        app: checkoutservice
    spec:                 
      containers:
      - name: server
        image: favxlaw/checkout:latest
        ports:
        - containerPort: 5050
        env:
        - name: PORT
          value: "5050"
        - name: PRODUCT_CATALOG_SERVICE_ADDR
          value: "productcatalogservice:3550"
        - name: CURRENCY_SERVICE_ADDR
          value: "currencyservice:7000" # Will do this later
        - name: CART_SERVICE_ADDR
          value: "cartservice:7070" # Will do this later
        - name: EMAIL_SERVICE_ADDR
          value: "emailservice:5000"
        - name: SHIPPING_SERVICE_ADDR
          value: "shippingservice:50051" # Will do this later # Will do this later  
        - name: PAYMENT_SERVICE_ADDR
          value: "paymentservice:50051" # Will do this later
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi  
        readinessProbe:
            grpc:
              port: 5050
        livenessProbe:
            grpc:
              port: 5050
          
---

apiVersion: v1
kind: Service
metadata:
  name: checkoutservice
spec:                       
  type: ClusterIP
  selector:
    app: checkoutservice
  ports:
    - protocol: TCP
      port: 5050           
      targetPort: 5050     